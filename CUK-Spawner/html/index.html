<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spawn Menu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080b10;
    --panel:     #0d1117;
    --border:    #1e2a38;
    --accent:    #00c6ff;
    --accent2:   #0072ff;
    --gold:      #f0c040;
    --text:      #c8d6e5;
    --muted:     #4a5568;
    --danger:    #ff4444;
    --glow:      0 0 18px rgba(0,198,255,0.35);
  }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  #overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(4, 7, 13, 0.82);
    backdrop-filter: blur(4px);
    justify-content: center;
    align-items: center;
    animation: fadeIn .25s ease;
  }
  #overlay.visible { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Panel ── */
  .panel {
    width: 480px;
    background: var(--panel);
    border: 1px solid var(--border);
    position: relative;
    animation: slideUp .3s cubic-bezier(.16,1,.3,1);
    overflow: hidden;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0);    }
  }

  /* corner accents */
  .panel::before, .panel::after {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--accent);
    border-style: solid;
  }
  .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  /* ── Header ── */
  .header {
    padding: 22px 26px 18px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .header-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: .8;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #fff;
    line-height: 1;
  }

  .header-line {
    position: absolute;
    bottom: 0; left: 26px; right: 26px;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  /* ── Section title ── */
  .section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 16px 26px 8px;
  }

  /* ── Spawn buttons ── */
  .spawn-list {
    padding: 0 16px;
  }

  .spawn-btn {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 14px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: background .15s, border-color .15s;
    text-align: left;
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  .spawn-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(0,198,255,0.06), transparent);
    opacity: 0;
    transition: opacity .15s;
  }

  .spawn-btn:hover {
    border-color: var(--accent);
    background: rgba(0,198,255,0.04);
  }
  .spawn-btn:hover::before { opacity: 1; }

  .spawn-btn:active { transform: scale(0.99); }

  /* left accent bar on hover */
  .spawn-btn::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform .15s;
  }
  .spawn-btn:hover::after { transform: scaleY(1); }

  /* icon */
  .btn-icon {
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
    color: var(--accent);
    transition: border-color .15s, color .15s;
  }
  .spawn-btn:hover .btn-icon {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  .btn-label {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: .5px;
    color: #dde7f0;
  }
  .btn-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: .5px;
    margin-top: 1px;
  }

  /* ── Last location special style ── */
  .last-btn .btn-icon { color: var(--gold); }
  .last-btn { border-color: rgba(240,192,64,.15); }
  .last-btn:hover { border-color: var(--gold); background: rgba(240,192,64,0.04); }
  .last-btn::after { background: var(--gold); }
  .last-btn:hover .btn-icon { border-color: var(--gold); box-shadow: 0 0 18px rgba(240,192,64,.35); color: var(--gold); }

  /* ── Divider ── */
  .divider {
    margin: 4px 26px 0;
    border: none;
    border-top: 1px solid var(--border);
  }

  /* ── Footer ── */
  .footer {
    padding: 14px 26px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .footer-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: .3; }
  }

  /* scanning line animation on panel */
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0,198,255,0.4), transparent);
    animation: scan 3.5s linear infinite;
    pointer-events: none;
    top: 0;
  }
  @keyframes scan {
    from { top: 0; opacity: 1; }
    to   { top: 100%; opacity: 0; }
  }
</style>
</head>
<body>

<div id="overlay">
  <div class="panel">
    <div class="scan-line"></div>

    <div class="header">
      <div class="header-label">◈ Spawn Manager</div>
      <h1>SELECT SPAWN POINT</h1>
      <div class="header-line"></div>
    </div>

    <!-- Last Location (shown only when available) -->
    <div id="lastSection" style="display:none">
      <div class="section-title">▸ Continue Session</div>
      <div class="spawn-list">
        <button class="spawn-btn last-btn" onclick="spawnLast()">
          <div class="btn-icon">⌖</div>
          <div>
            <div class="btn-label">Last Known Location</div>
            <div class="btn-sub">Resume where you left off</div>
          </div>
        </button>
      </div>
      <hr class="divider" />
    </div>

    <!-- Preset locations -->
    <div class="section-title">▸ Preset Locations</div>
    <div class="spawn-list" id="presetList"></div>

    <div class="footer">
      <div class="footer-dot"></div>
      CHOOSE A SPAWN POINT TO CONTINUE
    </div>
  </div>
</div>

<script>
  const overlay     = document.getElementById('overlay');
  const lastSection = document.getElementById('lastSection');
  const presetList  = document.getElementById('presetList');

  window.addEventListener('message', function(e) {
    const data = e.data;
    if (data.action !== 'openMenu') return;

    // Show/hide last location section
    lastSection.style.display = data.hasLastLocation ? 'block' : 'none';

    // Build preset buttons
    presetList.innerHTML = '';
    data.presets.forEach(function(p) {
      const btn = document.createElement('button');
      btn.className = 'spawn-btn';
      btn.innerHTML = `
        <div class="btn-icon">◎</div>
        <div>
          <div class="btn-label">${p.label}</div>
          <div class="btn-sub">Preset location ${p.index}</div>
        </div>`;
      btn.onclick = function() { spawnPreset(p.index); };
      presetList.appendChild(btn);
    });

    overlay.classList.add('visible');
  });

  function spawnPreset(index) {
    overlay.classList.remove('visible');
    fetch('https://CUK-Spawner/spawnAtPreset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ index: index })
    });
  }

  function spawnLast() {
    overlay.classList.remove('visible');
    fetch('https://CUK-Spawner/spawnAtLast', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({})
    });
  }
</script>
</body>
</html>
